sonar.sourceEncoding=UTF-8

sonar.sources=src,server,scripts
sonar.tests=cypress
sonar.test.inclusions=cypress/**/*.cy.js,cypress/**/*.cy.ts

sonar.exclusions=dist/**,node_modules/**,public/**,cypress/screenshots/**,cypress/videos/**

# Exclude files from duplication detection:
# - server/index.js : large monolithic file, structural repetition is intentional
# - SQL migration/seed files : INSERT blocks are inherently repetitive data, not code duplication
# - migration scripts : share utility patterns across one-shot scripts
sonar.cpd.exclusions=server/index.js,scripts/migrations/**,scripts/migrate-editorjs-to-tiptap.mjs

# No dedicated JS/TS coverage report is generated yet in this repository.
# Keep coverage metrics out of the quality gate until a real coverage artifact is added.
sonar.coverage.exclusions=src/**,server/**,scripts/**
