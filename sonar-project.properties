sonar.sourceEncoding=UTF-8

sonar.sources=src,server,scripts
sonar.tests=cypress
sonar.test.inclusions=cypress/**/*.cy.js,cypress/**/*.cy.ts

sonar.exclusions=dist/**,node_modules/**,public/**,cypress/screenshots/**,cypress/videos/**

# Keep server/index.js analyzed for bugs/security, but exclude it from duplication ratio.
sonar.cpd.exclusions=server/index.js

# No dedicated JS/TS coverage report is generated yet in this repository.
# Keep coverage metrics out of the quality gate until a real coverage artifact is added.
sonar.coverage.exclusions=src/**,server/**,scripts/**
