name: Deploy to GitHub Pages

permissions:
  id-token: write
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Build Docker image
        run: docker build -t gh-pages-test .
      - name: Test Docker image
        run: |
          docker run -d -p 8080:80 --name test-gh-pages gh-pages-test
          sleep 10
          curl -f http://localhost:8080 || (docker logs test-gh-pages && exit 1)
          docker stop test-gh-pages && docker rm test-gh-pages
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
