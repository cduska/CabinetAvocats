name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
      - name: Run unit tests
        run: npm test --if-present

      - name: Build Docker image
        run: docker build -t cabinet-avocats .

  sonar:
    runs-on: ubuntu-latest
    needs: build
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip Sonar analysis when token is missing
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN not configured; skipping Sonar analysis."
      - uses: actions/checkout@v4
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0
      - name: Use Node.js
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Use Java 17
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install dependencies
        if: env.SONAR_TOKEN != ''
        run: npm ci
      - name: Compute Sonar settings
        if: env.SONAR_TOKEN != ''
        id: sonar-meta
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          host_url="https://sonarcloud.io"
          project_key="${GITHUB_REPOSITORY_OWNER}_${repo_name}"
          organization="${GITHUB_REPOSITORY_OWNER}"

          echo "repo_name=$repo_name" >> "$GITHUB_OUTPUT"
          echo "host_url=$host_url" >> "$GITHUB_OUTPUT"
          echo "project_key=$project_key" >> "$GITHUB_OUTPUT"
          echo "organization=$organization" >> "$GITHUB_OUTPUT"
      - name: Ensure Sonar project exists
        if: env.SONAR_TOKEN != ''
        id: sonar-project
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ steps.sonar-meta.outputs.host_url }}
          SONAR_PROJECT_KEY: ${{ steps.sonar-meta.outputs.project_key }}
          SONAR_PROJECT_NAME: ${{ steps.sonar-meta.outputs.repo_name }}
          SONAR_ORGANIZATION: ${{ steps.sonar-meta.outputs.organization }}
        run: |
          project_exists() {
            local key="$1"
            local url="$SONAR_HOST_URL/api/projects/search?organization=$SONAR_ORGANIZATION&projects=$key"
            curl --silent --show-error --fail -u "$SONAR_TOKEN:" "$url" | grep -q '"total":[[:space:]]*1'
          }

          resolved_project_key="$SONAR_PROJECT_KEY"
          lowercase_project_key="$(echo "$SONAR_PROJECT_KEY" | tr '[:upper:]' '[:lower:]')"

          if project_exists "$SONAR_PROJECT_KEY"; then
            echo "Project found with key $SONAR_PROJECT_KEY"
          elif [ "$lowercase_project_key" != "$SONAR_PROJECT_KEY" ] && project_exists "$lowercase_project_key"; then
            resolved_project_key="$lowercase_project_key"
            echo "Project found with lowercase key $resolved_project_key"
          else
            echo "Project not found. Creating key $resolved_project_key"
            curl --silent --show-error --fail -u "$SONAR_TOKEN:" \
              -X POST "$SONAR_HOST_URL/api/projects/create" \
              -d "organization=$SONAR_ORGANIZATION" \
              -d "project=$resolved_project_key" \
              --data-urlencode "name=$SONAR_PROJECT_NAME" > /dev/null
            echo "Project created."
          fi

          echo "project_key=$resolved_project_key" >> "$GITHUB_OUTPUT"

          if curl --silent --show-error --fail -u "$SONAR_TOKEN:" \
            -X POST "$SONAR_HOST_URL/api/project_branches/rename" \
            -d "project=$resolved_project_key" \
            -d "name=main" > /dev/null; then
            echo "Sonar main branch is set to main."
          else
            echo "Could not set Sonar main branch to main automatically."
          fi
      - name: Run Sonar analysis
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ steps.sonar-meta.outputs.host_url }}
          SONAR_PROJECT_KEY: ${{ steps.sonar-project.outputs.project_key }}
          SONAR_PROJECT_NAME: ${{ steps.sonar-meta.outputs.repo_name }}
          SONAR_ORGANIZATION: ${{ steps.sonar-meta.outputs.organization }}
        run: |
          args=(
            "-Dsonar.projectKey=$SONAR_PROJECT_KEY"
            "-Dsonar.projectName=$SONAR_PROJECT_NAME"
            "-Dsonar.host.url=$SONAR_HOST_URL"
            "-Dsonar.token=$SONAR_TOKEN"
            "-Dsonar.qualitygate.wait=true"
          )

          if [ -n "$SONAR_ORGANIZATION" ]; then
            args+=("-Dsonar.organization=$SONAR_ORGANIZATION")
          fi

          npx --yes sonarqube-scanner "${args[@]}"

  publish-image:
    needs:
      - build
      - cypress-run
      - sonar
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always() && needs.build.result == 'success' && needs.cypress-run.result == 'success' && (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cabinet-avocats .
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag Docker image
        run: docker tag cabinet-avocats ghcr.io/cduska/cabinet-avocats:latest
      - name: Push Docker image
        run: docker push ghcr.io/cduska/cabinet-avocats:latest

  deploy:
    needs:
      - build
      - cypress-run
      - sonar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && always() && needs.build.result == 'success' && needs.cypress-run.result == 'success' && (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  cypress-run:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120
          browser: chrome
